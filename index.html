<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>臨床実習 希望調査システム ver2.0</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .ratio-low { color: #28a745; font-weight: bold; }
        .ratio-mid { color: #d39e00; font-weight: bold; }
        .ratio-high { color: #dc3545; font-weight: bold; }
        .ratio-label { font-size: 0.8rem; margin-left: 5px; }
        .form-section { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #dee2e6; }
    </style>
</head>
<body class="bg-light p-3">
<div class="container bg-white p-4 rounded shadow-sm">
    <h4 class="mb-4">実習希望調査</h4>
    <form id="hopeForm">
        <div class="form-section">
            <h6>学生認証</h6>
            <input type="text" class="form-control" id="student_id" placeholder="学籍番号6桁" maxlength="6">
        </div>
        <div class="form-section">
            <h6>Any枠 (第1希望より選択)</h6>
            <div id="any-container"></div>
        </div>
        <div class="form-section">
            <h6>一般枠 (第1〜5希望)</h6>
            <div id="slot-container"></div>
        </div>
        <button type="button" class="btn btn-success btn-block" onclick="submitData()">希望を送信する</button>
    </form>
</div>

<script>
    const GAS_API_URL = "ここにデプロイURLを記述";
    let serverDepartments = [], serverSlots = [];

    async function init() {
        const res = await fetch(GAS_API_URL);
        const data = await res.json();
        serverDepartments = data.departments; // {id, name, ratio}
        serverSlots = data.slots;
        renderForm();
        if(data.latest) restoreData(data.latest);
    }

    function renderForm() {
        // Any枠
        let anyHtml = "";
        for(let i=1; i<=4; i++) anyHtml += `<select class="form-control my-1" id="Any_P${i}">${buildOptions()}</select>`;
        document.getElementById("any-container").innerHTML = anyHtml;

        // 一般枠
        let slotHtml = "";
        serverSlots.forEach(s => {
            slotHtml += `<strong>${s}</strong>`;
            for(let p=1; p<=5; p++) {
                slotHtml += `<div><select class="form-control form-control-sm my-1" onchange="updateLabel(this)" id="${s}_P${p}">${buildOptions()}</select><span class="ratio-label"></span></div>`;
            }
        });
        document.getElementById("slot-container").innerHTML = slotHtml;
    }

    function buildOptions() {
        return '<option value="">選択してください</option>' + 
               serverDepartments.map(d => `<option value="${d.id}">${d.name}</option>`).join("");
    }

    function updateLabel(el) {
        const d = serverDepartments.find(x => x.id == el.value);
        const l = el.nextElementSibling;
        if(d) {
            let cls = d.ratio >= 2.0 ? 'ratio-high' : (d.ratio >= 1.0 ? 'ratio-mid' : 'ratio-low');
            l.className = 'ratio-label ' + cls;
            l.innerText = ` (倍率:${d.ratio})`;
        }
    }

    function validate() {
        let stats = { '1000': 0, '2000': 0, '3000': 0 };
        let anyVals = [];
        
        // Any枠重複と第一希望由来チェック
        for(let i=1; i<=4; i++) {
            let val = document.getElementById(`Any_P${i}`).value;
            if(!val) continue;
            if(anyVals.includes(val)) return "Any枠で重複があります。";
            anyVals.push(val);
        }

        // 規定チェック
        serverSlots.forEach(s => {
            let p1 = document.getElementById(`${s}_P1`).value;
            if(p1.startsWith('1')) stats['1000']++;
            else if(p1.startsWith('2')) stats['2000']++;
            else if(p1.startsWith('3')) stats['3000']++;
        });

        if(stats['1000'] < 2) return "1000番台は2クール以上必要です。";
        if(stats['2000'] < 1) return "2000番台は1クール以上必要です。";
        if(stats['3000'] < 1 || stats['3000'] > 3) return "3000番台は1〜3クールで選択してください。";
        return null;
    }

    async function submitData() {
        let error = validate();
        if(error) { alert(error); return; }
        
        // サーバーへ送信処理
        alert("送信成功");
    }

    init();
</script>
</body>
</html>
