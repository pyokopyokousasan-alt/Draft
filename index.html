<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>臨床実習 希望調査システム 完全統合版</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .form-section { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #dee2e6; }
        .cool-box { border: 2px solid #007bff; border-radius: 8px; padding: 10px; margin-bottom: 15px; background: #fff; }
    </style>
</head>
<body class="p-3">
<div class="container bg-white p-4 rounded shadow-sm">
    <h4>臨床実習 希望調査システム</h4>
    <div id="status" class="alert alert-info">ログイン確認中...</div>
    <form id="hopeForm" style="display:none;">
        <div class="form-section">
            <h6>学籍番号: <span id="sid-display"></span></h6>
            <input type="hidden" id="student_id">
        </div>
        <div class="form-section">
            <h6>Any枠 (第1希望と重複不可)</h6>
            <div id="any-container"></div>
        </div>
        <div class="form-section">
            <h6>一般枠 (全16クール)</h6>
            <div id="slot-container"></div>
        </div>
        <button type="button" class="btn btn-success btn-block" onclick="submitData()">希望を送信する</button>
    </form>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyMjVcIhOeat7Fe6TPk0ys2W4BJl9zPRevKfGky6hg5cPxEzw0GzuO-gKiADgiEirtkuQ/exec";
    let serverDepartments = [];

    // --- 1. 初期化と認証 ---
    window.onload = () => {
        liff.init({ liffId: "2010321278-kOScGbBq" }).then(() => {
            if (!liff.isLoggedIn()) liff.login();
            else liff.getProfile().then(p => loadData(p.userId));
        });
    };

    async function loadData(uid) {
        const res = await fetch(`${GAS_API_URL}?uid=${uid}`);
        const data = await res.json();
        if (!data.authorized) { document.getElementById("status").innerText = "認証エラー"; return; }
        
        serverDepartments = data.departments;
        document.getElementById("status").style.display = "none";
        document.getElementById("hopeForm").style.display = "block";
        document.getElementById("student_id").value = data.student_id;
        document.getElementById("sid-display").innerText = data.student_id;
        renderForm();
    }

    // --- 2. フォーム生成と制御 ---
    function renderForm() {
        // Any枠
        let anyHtml = "";
        for(let i=1; i<=4; i++) anyHtml += `<select class="form-control mb-1" id="Any_P${i}">${buildOptions()}</select>`;
        document.getElementById("any-container").innerHTML = anyHtml;

        // 一般枠 (16クール)
        let slotHtml = "";
        for(let c=1; c<=16; c++) {
            slotHtml += `<div class="cool-box"><h6>第${c}クール</h6>`;
            for(let p=1; p<=5; p++) {
                slotHtml += `<select class="form-control mb-1" id="${c}p${p}" onchange="onSelectChange('${c}p${p}')">${buildOptions()}</select>`;
            }
            slotHtml += `</div>`;
        }
        document.getElementById("slot-container").innerHTML = slotHtml;
    }

    function buildOptions() {
        return '<option value="">選択してください</option>' + 
               serverDepartments.map(d => `<option value="${d.id}">${d.name} (${d.type})</option>`).join("");
    }

    // --- 3. 排他制御ロジック ---
    function onSelectChange(pId) {
        const coolNum = pId.split('p')[0];
        const el = document.getElementById(pId);
        const dept = serverDepartments.find(d => d.id == el.value);

        if (dept && dept.type === "4W") {
            for(let i=1; i<=5; i++) {
                let other = document.getElementById(`${coolNum}p${i}`);
                if (other && other !== el) { other.value = ""; other.disabled = true; }
            }
        } else {
            for(let i=1; i<=5; i++) document.getElementById(`${coolNum}p${i}`).disabled = false;
        }
    }

    // --- 4. 最終バリデーションと送信 ---
    function submitData() {
        // 重複チェック: Anyと第1希望
        let anyVals = [];
        for(let i=1; i<=4; i++) anyVals.push(document.getElementById(`Any_P${i}`).value);
        
        for(let c=1; c<=16; c++) {
            let p1 = document.getElementById(`${c}p1`).value;
            if(p1 && anyVals.includes(p1)) { alert("エラー：Anyと第1希望で重複があります"); return; }
        }

        // 占有チェック: 4W=2.0, 2W/H=0.4
        for(let c=1; c<=16; c++) {
            let size = 0;
            for(let p=1; p<=5; p++) {
                let dept = serverDepartments.find(d => d.id == document.getElementById(`${c}p${p}`).value);
                if(dept) size += (dept.type === "4W" ? 2.0 : 0.4);
            }
            if(size > 2.0) { alert(`第${c}クールで枠超過です`); return; }
        }

        alert("送信処理開始");
        // ここで fetch(GAS_API_URL, {method:"POST", ...})
    }
</script>
</body>
</html>
